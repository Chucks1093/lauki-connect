services:
  postgres:
    image: postgres:16-alpine
    container_name: lauki-connect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lauki_connect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - lauki-connect-postgres:/var/lib/postgresql/data

volumes:
  lauki-connect-postgres:

