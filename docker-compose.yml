services:
  postgres:
    image: postgres:16-alpine
    container_name: lauki-connect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lauki_connect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - lauki_connect_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lauki_connect"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lauki_connect_postgres:
